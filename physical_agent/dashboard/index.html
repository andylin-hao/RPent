<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PhysicalAgent · Live Monitor</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
    --tool: #1f6feb;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header h1 .dot { color: var(--accent); }
  select {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; max-width: 460px;
  }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .5px; border: 1px solid transparent;
  }
  .b-running { background: rgba(63,185,80,.15); color: var(--green); border-color: var(--green); animation: pulse 1.6s infinite; }
  .b-done { background: rgba(88,166,255,.15); color: var(--accent); border-color: var(--accent); }
  .b-stale { background: rgba(139,148,158,.15); color: var(--muted); border-color: var(--muted); }
  .b-ok { background: rgba(63,185,80,.15); color: var(--green); border-color: var(--green); }
  .b-fail { background: rgba(248,81,73,.12); color: var(--red); border-color: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .meta { color: var(--muted); font-size: 12px; }
  .meta b { color: var(--fg); font-weight: 600; }
  .grow { flex: 1; }

  main { flex: 1; display: grid; grid-template-columns: var(--leftw, 1.4fr) 6px 1fr; gap: 0; min-height: 0; }
  .col { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .col.right { display: grid; grid-template-rows: var(--frameh, 42vh) 6px 1fr; min-height: 0; }

  /* draggable splitters */
  .gutter { background: var(--border); position: relative; z-index: 5; }
  .gutter::after { content: ""; position: absolute; inset: 0; }
  .gutter:hover, .gutter.dragging { background: var(--accent); }
  .gutter-v { cursor: col-resize; }
  .gutter-v::after { left: -3px; right: -3px; }   /* fatter hit area */
  .gutter-h { cursor: row-resize; }
  .gutter-h::after { top: -3px; bottom: -3px; }
  body.resizing { cursor: inherit; user-select: none; }
  body.resizing iframe, body.resizing img { pointer-events: none; }
  .panel-title {
    padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .panel-title .count { color: var(--fg); font-weight: 600; }

  /* transcript */
  #transcript { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .ev { margin-bottom: 8px; }
  .ev.turn { color: var(--purple); font-weight: 600; font-size: 12px;
    border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 10px; }
  .ev.text { white-space: pre-wrap; word-wrap: break-word; }
  .ev.meta { color: var(--muted); font-size: 12px; font-style: italic; }
  .ev.tool_call, .ev.tool_result {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 9px; overflow-x: auto;
  }
  .ev.tool_call { border-left: 3px solid var(--tool); }
  .ev.tool_result { border-left: 3px solid var(--muted); opacity: .85; }
  .ev .tname { color: var(--accent); font-weight: 600; }
  .ev .tname.err { color: var(--red); }
  .ev .args { color: var(--muted); }

  /* collapsible tool-call group */
  .toolgroup { margin: 6px 0; }
  .tg-head {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px;
    color: var(--muted); cursor: pointer; user-select: none; padding: 3px 6px;
    border-radius: 6px; display: inline-block;
  }
  .tg-head:hover { color: var(--fg); background: var(--panel2); }
  .tg-head::before { content: "▸ "; color: var(--tool); }
  .tg-body { display: none; margin-top: 4px; }
  .toolgroup.open > .tg-body,
  #transcript.alltools .tg-body { display: block; }
  .toolgroup.open > .tg-head::before,
  #transcript.alltools .tg-head::before { content: "▾ "; }
  #transcript.alltools .tg-head { pointer-events: none; }
  .tg-body .ev { margin-bottom: 5px; }

  /* frame */
  .framewrap { background: #000; display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border); position: relative; min-height: 200px; }
  .framewrap img { max-width: 100%; max-height: 100%; display: block; image-rendering: auto; }
  .frame-tabs { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; }
  .frame-tabs button {
    background: rgba(22,27,34,.8); color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
  }
  .frame-tabs button.active { color: var(--fg); border-color: var(--accent); }
  .frame-cap { position: absolute; bottom: 8px; left: 10px; font-size: 11px; color: var(--muted);
    background: rgba(13,17,23,.7); padding: 2px 8px; border-radius: 4px; }

  /* timeline */
  #timeline { overflow-y: auto; padding: 6px 0; }
  .step { display: flex; gap: 10px; padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .step:hover { background: var(--panel2); }
  .step.hasclip { cursor: pointer; }
  .step.episode { cursor: pointer; background: rgba(88,166,255,.08); }
  .step.hasclip .idx::after { content: "▶"; color: var(--green); font-size: 9px; margin-left: 4px; }
  .step.episode .idx::after { content: "▶"; color: var(--accent); font-size: 9px; margin-left: 4px; }
  .step .idx { color: var(--muted); width: 26px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .step .body { min-width: 0; flex: 1; }
  .step .act { font-weight: 600; color: var(--accent); }
  .step .det { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .step .el { color: var(--muted); font-size: 11px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .step.term { background: rgba(63,185,80,.08); }

  /* launcher (start screen) */
  #launcher {
    position: fixed; inset: 0; z-index: 50; background: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #launcher.hidden { display: none; }
  .launch-card {
    width: 100%; max-width: 560px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px; padding: 26px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
  }
  .launch-card h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
  .launch-card h2 .dot { color: var(--accent); }
  .launch-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .lform { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
  .lfield { display: flex; flex-direction: column; gap: 5px; }
  .lfield.full { grid-column: 1 / -1; }
  .lfield label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .lfield input[type=text], .lfield input[type=number], .lfield select {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 13px; width: 100%; max-width: none;
  }
  .lcheck { flex-direction: row; align-items: center; gap: 8px; }
  .lcheck label { text-transform: none; letter-spacing: 0; font-size: 13px; color: var(--fg); }
  .launch-actions { display: flex; align-items: center; gap: 14px; margin-top: 22px; }
  #runBtn {
    background: var(--green); color: #07210e; border: none; border-radius: 8px;
    padding: 10px 26px; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .3px;
  }
  #runBtn:hover { filter: brightness(1.08); }
  #runBtn:disabled { opacity: .55; cursor: default; }
  #launchStatus { color: var(--muted); font-size: 13px; }

  .empty { color: var(--muted); padding: 24px 14px; font-style: italic; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div id="launcher" class="hidden">
    <div class="launch-card">
      <h2><span class="dot">●</span> PhysicalAgent · New Run</h2>
      <div class="sub">Review the config, then click Run to start the agent.</div>
      <div class="lform">
        <div class="lfield full">
          <label for="f-suite">Suite</label>
          <select id="f-suite">
            <option value="libero_object_task">libero_object_task</option>
            <option value="libero_object_swap">libero_object_swap</option>
            <option value="libero_object_lan">libero_object_lan</option>
            <option value="libero_goal_task">libero_goal_task</option>
            <option value="libero_goal_swap">libero_goal_swap</option>
            <option value="libero_goal_lan">libero_goal_lan</option>
            <option value="libero_spatial_task">libero_spatial_task</option>
            <option value="libero_spatial_swap">libero_spatial_swap</option>
            <option value="libero_spatial_lan">libero_spatial_lan</option>
            <option value="libero_10">libero_10</option>
            <option value="libero_10_task">libero_10_task</option>
            <option value="libero_10_swap">libero_10_swap</option>
            <option value="libero_10_lan">libero_10_lan</option>
          </select>
        </div>
        <div class="lfield">
          <label for="f-task">Task</label>
          <input type="number" id="f-task" min="0" step="1" />
        </div>
        <div class="lfield">
          <label for="f-seed">Seed</label>
          <input type="number" id="f-seed" min="0" step="1" />
        </div>
        <div class="lfield">
          <label for="f-cerebrum">Cerebrum (LLM backend)</label>
          <select id="f-cerebrum">
            <option value="anthropic">anthropic (unsupported)</option>
            <option value="openai_compat">openai_compat (unsupported)</option>
            <option value="claude_code">claude_code</option>
            <option value="codex">codex (unsupported)</option>
          </select>
        </div>
        <div class="lfield">
          <label for="f-max_turns">Max turns</label>
          <input type="number" id="f-max_turns" min="1" step="1" />
        </div>
        <div class="lfield">
          <label for="f-max_tokens">Max tokens</label>
          <input type="number" id="f-max_tokens" min="1" step="1" />
        </div>
        <div class="lfield">
          <label for="f-max_episode_steps">Max episode steps</label>
          <input type="number" id="f-max_episode_steps" min="1" step="1" />
        </div>
        <div class="lfield">
          <label for="f-model">Model <span style="text-transform:none">(blank = default)</span></label>
          <input type="text" id="f-model" placeholder="default" />
        </div>
        <div class="lfield">
          <label for="f-cuda_device">CUDA device <span style="text-transform:none">(blank = default)</span></label>
          <input type="text" id="f-cuda_device" placeholder="default" />
        </div>
      </div>
      <div class="launch-actions">
        <button id="runBtn">Run</button>
        <span id="launchStatus"></span>
      </div>
    </div>
  </div>

  <header>
    <h1><span class="dot">●</span> PhysicalAgent <span class="meta">Live Monitor</span></h1>
    <span id="statusBadge" class="badge b-stale">—</span>
    <span id="resultBadge" class="badge b-fail" style="display:none"></span>
    <span class="meta" id="taskMeta"></span>
    <span class="grow"></span>
    <span class="meta" id="usageMeta"></span>
    <span class="meta" id="connMeta"></span>
  </header>

  <main>
    <div class="col left">
      <div class="panel-title">
        Agent reasoning &amp; tool calls
        <span class="count" id="evCount"></span>
        <span class="grow"></span>
        <label class="meta" style="text-transform:none;letter-spacing:0">
          <input type="checkbox" id="showtools" /> expand tool calls
        </label>
        <label class="meta" style="text-transform:none;letter-spacing:0">
          <input type="checkbox" id="autoscroll" checked /> auto-scroll
        </label>
      </div>
      <div id="transcript"><div class="empty">Select a run to begin.</div></div>
    </div>

    <div class="gutter gutter-v" id="gutterV" title="拖动调整左右宽度"></div>

    <div class="col right">
      <div class="framewrap">
        <div class="frame-tabs">
          <button data-kind="agent" class="active">realtime-Pi0 view</button>
          <button data-kind="camera">realtime-camera</button>
        </div>
        <img id="frame" alt="waiting for first frame…" />
        <video id="video" controls playsinline style="display:none;max-width:100%;max-height:100%"></video>
        <div class="frame-cap" id="frameCap"></div>
      </div>
      <div class="gutter gutter-h" id="gutterH" title="拖动调整画面高度"></div>
      <div class="col" style="min-height:0">
        <div class="panel-title">Action timeline <span class="count" id="stepCount"></span></div>
        <div id="timeline"><div class="empty">No actions yet.</div></div>
      </div>
    </div>
  </main>

<script>
const $ = (s) => document.querySelector(s);
let curRun = null, evShown = 0, frameKind = "agent", es = null, frameIdx = -1;
let actionVideo = null, actionVideoLoadedKey = null;
let episodeVideoAvailable = false;
let lastRealtimeFrameKind = "agent";
let autoActionLastStep = 0;
let autoActionPrimed = false;
let autoActionPlayback = null;
let autoActionReturnTimer = null;
const AUTO_ACTION_RETURN_DELAY_MS = 300;

function cancelAutoActionReturn() {
  if (autoActionReturnTimer) {
    clearTimeout(autoActionReturnTimer);
    autoActionReturnTimer = null;
  }
}

function clearVideoElement() {
  const v = $("#video");
  try { v.pause(); } catch {}
  v.onended = null;
  v.muted = false;
  v.removeAttribute("src");
  v.load();
  videoLoadedRun = null;
  actionVideoLoadedKey = null;
}

function fmtArgs(o) {
  if (o == null) return "";
  if (typeof o === "string") return o;
  try { return JSON.stringify(o); } catch { return String(o); }
}

async function loadRun() {
  const r = await fetch("/api/runs").then(x => x.json());
  if (!r.runs.length) {
    $("#taskMeta").textContent = `(no runs in ${r.runs_dir})`;
    return;
  }

  const run = r.runs[0];
  selectRun(run.id);
}

function setBadge(state) {
  const b = $("#statusBadge");
  b.className = "badge b-" + (state || "stale");
  b.textContent = state || "—";
}

function setResult(terminated, state) {
  const b = $("#resultBadge");
  if (state === "done" || terminated) {
    b.style.display = "";
    b.className = "badge " + (terminated ? "b-ok" : "b-fail");
    b.textContent = terminated ? "TASK SOLVED" : "not solved";
  } else {
    b.style.display = "none";
  }
}

function maxTimelineStep(tl) {
  if (!Array.isArray(tl) || !tl.length) return 0;
  return tl.reduce((m, s) => Math.max(m, Number(s.step) || 0), 0);
}

function maybeAutoPlayNewAction(tl, nextFrameIdx) {
  if (!Array.isArray(tl)) return false;
  const candidates = tl.filter(s =>
    s.has_action_video && (Number(s.step) || 0) > autoActionLastStep);
  autoActionLastStep = Math.max(autoActionLastStep, maxTimelineStep(tl));
  const step = candidates[candidates.length - 1];
  if (!step || !(frameKind === "agent" || frameKind === "camera")) return false;
  return playActionVideo(step, {
    auto: true,
    nextFrameIdx,
    returnKind: frameKind,
  });
}

function renderTimeline(tl, hasEpisodeVideo = episodeVideoAvailable) {
  tl = Array.isArray(tl) ? tl : [];
  episodeVideoAvailable = !!hasEpisodeVideo;
  const el = $("#timeline");
  const total = tl.length + (episodeVideoAvailable ? 1 : 0);
  $("#stepCount").textContent = total ? total : "";
  if (!tl.length && !episodeVideoAvailable) {
    el.innerHTML = '<div class="empty">No actions yet.</div>';
    return;
  }
  el.innerHTML = "";
  for (const s of tl) {
    if (s.step === 0 && !s.action) continue;
    const div = document.createElement("div");
    div.className = "step" + (s.terminated ? " term" : "");
    if (s.has_action_video) div.className += " hasclip";
    const res = s.result || {};
    let det = "";
    if (res.final_dist_m != null) det += `dist ${(+res.final_dist_m).toFixed(3)}m `;
    if (res.steps_used != null) det += `${res.steps_used}/${res.max_steps ?? "?"} steps `;
    if (res.lifted != null) det += `lifted=${res.lifted} `;
    if (res.chunks != null) det += `chunks=${res.chunks} `;
    det = det.trim() || fmtArgs(s.args).slice(0, 60);
    div.innerHTML = `<span class="idx">${s.step}</span>
      <div class="body"><span class="act">${s.action ?? "—"}</span>
      <div class="det" title="${fmtArgs(res).replace(/"/g,'&quot;')}">${det}</div></div>
      <span class="el">${s.elapsed_s != null ? s.elapsed_s + "s" : ""}</span>`;
    if (s.has_action_video) {
      div.title = "Click to replay this action";
      div.addEventListener("click", () => playActionVideo(s, {
        returnAfterEnd: true,
        returnKind: "agent",
      }));
    }
    el.appendChild(div);
  }
  if (episodeVideoAvailable) {
    const div = document.createElement("div");
    div.className = "step episode";
    div.title = "Click to replay the full episode";
    div.innerHTML = `<span class="idx">full</span>
      <div class="body"><span class="act">episode video</span>
      <div class="det">complete run video</div></div>
      <span class="el">finished</span>`;
    div.addEventListener("click", playEpisodeVideo);
    el.appendChild(div);
  }
}

let curToolGroup = null;

function makeToolEl(ev) {
  const div = document.createElement("div");
  div.className = "ev " + ev.type;
  if (ev.type === "tool_call") {
    div.innerHTML = `→ <span class="tname">${ev.tool}</span> <span class="args"></span>`;
    div.querySelector(".args").textContent = fmtArgs(ev.args);
  } else {
    const isErr = ev.result && ev.result.is_error;
    div.innerHTML = `← <span class="tname ${isErr ? "err" : ""}">${ev.tool}</span> <span class="args"></span>`;
    div.querySelector(".args").textContent = fmtArgs(ev.result);
  }
  return div;
}

function appendEvents(events) {
  const box = $("#transcript");
  if (evShown === 0) { box.innerHTML = ""; curToolGroup = null; }
  for (const ev of events) {
    if (ev.type === "tool_call" || ev.type === "tool_result") {
      // collapse consecutive tool calls/results into one foldable group
      if (!curToolGroup) {
        const g = document.createElement("div");
        g.className = "toolgroup";
        g.innerHTML = `<div class="tg-head"><span class="tg-count">0</span> tool calls</div><div class="tg-body"></div>`;
        g.querySelector(".tg-head").addEventListener("click", () => g.classList.toggle("open"));
        box.appendChild(g);
        curToolGroup = g;
      }
      curToolGroup.querySelector(".tg-body").appendChild(makeToolEl(ev));
      const n = curToolGroup.querySelectorAll(".tg-body .ev.tool_call").length;
      curToolGroup.querySelector(".tg-count").textContent = n;
    } else {
      curToolGroup = null;  // close the group; turn/text render at top level
      const div = document.createElement("div");
      div.className = "ev " + ev.type;
      if (ev.type === "meta") div.textContent = `[${ev.tag}] ${ev.text}`;
      else div.textContent = ev.text;
      box.appendChild(div);
    }
  }
  evShown += events.length;
  $("#evCount").textContent = evShown ? evShown + " events" : "";
  if ($("#autoscroll").checked) box.scrollTop = box.scrollHeight;
}

let txInflight = false, txAgain = false;
async function refreshTranscript() {
  if (!curRun) return;
  // Serialize: only one fetch in flight at a time. Concurrent triggers
  // (selectRun + SSE ticks) would otherwise read the same `evShown`, fetch
  // overlapping chunks, and append in nondeterministic resolution order —
  // which is what made turns show up out of order / duplicated.
  if (txInflight) { txAgain = true; return; }
  txInflight = true;
  const run = curRun;
  try {
    const r = await fetch(
      `/api/run/transcript?run=${encodeURIComponent(run)}&since=${evShown}`
    ).then(x => x.json());
    if (run !== curRun) return;            // switched run mid-flight — drop
    if (r.events && r.events.length) appendEvents(r.events);
    else if (evShown === 0) $("#transcript").innerHTML = '<div class="empty">No transcript events yet.</div>';
  } catch (e) {
    /* transient — next tick retries */
  } finally {
    txInflight = false;
    if (txAgain) { txAgain = false; refreshTranscript(); }  // coalesced re-run
  }
}

let videoLoadedRun = null;

function setFrameKind(kind) {
  cancelAutoActionReturn();
  if (kind === "agent" || kind === "camera") {
    lastRealtimeFrameKind = kind;
    autoActionPlayback = null;
    clearVideoElement();
  }
  frameKind = kind;
  if (kind !== "actionVideo") actionVideo = null;
  document.querySelectorAll(".frame-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.kind === kind));
  frameIdx = -1;
  refreshFrame();
}

function finishAutoActionPlayback() {
  if (!autoActionPlayback || autoActionReturnTimer) return;
  const playback = autoActionPlayback;
  autoActionReturnTimer = setTimeout(() => {
    autoActionReturnTimer = null;
    if (autoActionPlayback !== playback) return;
    const nextFrameIdx = playback.nextFrameIdx;
    const returnKind = playback.returnKind || lastRealtimeFrameKind || "agent";
    autoActionPlayback = null;
    actionVideo = null;
    frameKind = returnKind;
    frameIdx = -1;
    clearVideoElement();
    document.querySelectorAll(".frame-tabs button").forEach(b =>
      b.classList.toggle("active", b.dataset.kind === returnKind));
    refreshFrame(nextFrameIdx);
    refreshMeta({ autoPlayNewAction: true, nextFrameIdx });
  }, AUTO_ACTION_RETURN_DELAY_MS);
}

function playActionVideo(step, opts = {}) {
  if (!curRun || !step || !step.has_action_video) return false;
  cancelAutoActionReturn();
  actionVideo = step;
  autoActionPlayback = opts.auto || opts.returnAfterEnd
    ? {
        step: Number(step.step) || 0,
        nextFrameIdx: opts.nextFrameIdx,
        auto: !!opts.auto,
        returnKind: opts.returnKind || lastRealtimeFrameKind,
      }
    : null;
  frameKind = "actionVideo";
  document.querySelectorAll(".frame-tabs button").forEach(b => b.classList.remove("active"));
  frameIdx = -1;
  refreshFrame();
  return true;
}

function playEpisodeVideo() {
  if (!curRun || !episodeVideoAvailable) return;
  cancelAutoActionReturn();
  autoActionPlayback = null;
  actionVideo = null;
  frameKind = "video";
  document.querySelectorAll(".frame-tabs button").forEach(b => b.classList.remove("active"));
  frameIdx = -1;
  refreshFrame();
}

function refreshFrame(idx) {
  if (!curRun) return;
  const isVideo = frameKind === "video" || frameKind === "actionVideo";
  $("#video").style.display = isVideo ? "block" : "none";
  $("#frame").style.display = isVideo ? "none" : "block";
  if (isVideo) {
    const v = $("#video");
    if (frameKind === "actionVideo") {
      if (!actionVideo) return;
      const key = `${curRun}:${actionVideo.step}`;
      if (actionVideoLoadedKey !== key) {
        v.src = `/api/run/action-video?run=${encodeURIComponent(curRun)}&step=${encodeURIComponent(actionVideo.step)}&t=${Date.now()}`;
        actionVideoLoadedKey = key;
        videoLoadedRun = null;
        v.load();
        v.playbackRate = 0.5;
      } else {
        try { v.currentTime = 0; } catch {}
      }
      const shouldReturn = autoActionPlayback && autoActionPlayback.step === (Number(actionVideo.step) || 0);
      v.muted = !!(shouldReturn && autoActionPlayback.auto);
      v.onended = shouldReturn ? finishAutoActionPlayback : null;
      const p = v.play();
      if (p && typeof p.catch === "function") {
        p.catch(() => { if (shouldReturn) finishAutoActionPlayback(); });
      }
      $("#frameCap").textContent = `action #${actionVideo.step} ${actionVideo.action}`;
      return;
    }
    if (videoLoadedRun !== curRun) {
      v.src = `/api/run/video?run=${encodeURIComponent(curRun)}&t=${Date.now()}`;
      videoLoadedRun = curRun;
      actionVideoLoadedKey = null;
      v.load();
      v.playbackRate = 1.0;
    }
    v.muted = false;
    v.onended = null;
    $("#frameCap").textContent = "episode video";
    return;
  }
  if (idx != null && idx === frameIdx) return;
  frameIdx = idx ?? frameIdx;
  const url = `/api/run/frame?run=${encodeURIComponent(curRun)}&kind=${frameKind}&t=${Date.now()}`;
  const img = $("#frame");
  img.onload = () => { $("#frameCap").textContent = `${frameKind} · frame #${frameIdx}`; };
  img.src = url;
}

async function refreshMeta(opts = {}) {
  if (!curRun) return;
  const r = await fetch(`/api/run?run=${encodeURIComponent(curRun)}`).then(x => x.json());
  setBadge(r.state);
  setResult(r.terminated, r.state);
  $("#taskMeta").innerHTML = `<b>${r.suite ?? r.name}</b> · task ${r.task ?? "?"} · seed ${r.seed ?? "?"}`;
  if (r.usage) $("#usageMeta").textContent =
    `token in ${r.usage.in.toLocaleString()} · out ${r.usage.out.toLocaleString()} · ${r.usage.tool_calls} tools`;
  renderTimeline(r.timeline || [], r.has_video);
  if (opts.primeAutoActionStep) {
    autoActionLastStep = maxTimelineStep(r.timeline || []);
    autoActionPrimed = true;
  }
  const autoStarted = opts.autoPlayNewAction && autoActionPrimed && !autoActionPlayback
    ? maybeAutoPlayNewAction(r.timeline || [], opts.nextFrameIdx ?? r.frame_idx)
    : false;
  if (!r.has_video && frameKind === "video") setFrameKind("agent");
  if (
    !autoStarted
    && !autoActionPlayback
    && (frameKind === "agent" || frameKind === "camera")
  ) refreshFrame(r.frame_idx);
}

function connectSSE() {
  if (es) es.close();
  es = new EventSource(`/api/stream?run=${encodeURIComponent(curRun)}`);
  es.onmessage = (e) => {
    const sig = JSON.parse(e.data);
    setBadge(sig.state);
    setResult(sig.terminated, sig.state);
    if (sig.usage) $("#usageMeta").textContent =
      `tok in ${sig.usage.in.toLocaleString()} · out ${sig.usage.out.toLocaleString()} · ${sig.usage.tool_calls} tools`;
    $("#connMeta").textContent = "● live";
    refreshTranscript();
    // refresh timeline lazily on step change
    if (sig.n_steps !== connectSSE._steps) {
      connectSSE._steps = sig.n_steps;
      refreshMeta({
        autoPlayNewAction: autoActionPrimed,
        primeAutoActionStep: !autoActionPrimed,
        nextFrameIdx: sig.frame_idx,
      });
      return;
    }
    if (sig.has_video && !episodeVideoAvailable) refreshMeta();
    if (
      !autoActionPlayback
      && (frameKind === "agent" || frameKind === "camera")
      && sig.frame_idx != null
      && sig.frame_idx !== frameIdx
    ) refreshFrame(sig.frame_idx);
  };
  es.onerror = () => { $("#connMeta").textContent = "○ reconnecting…"; };
}

function selectRun(id) {
  cancelAutoActionReturn();
  curRun = id; evShown = 0; frameIdx = -1; connectSSE._steps = -1;
  curToolGroup = null;
  // reset media to the live frame view for the newly selected run
  videoLoadedRun = null; actionVideo = null; actionVideoLoadedKey = null;
  episodeVideoAvailable = false; autoActionLastStep = 0; autoActionPrimed = false; autoActionPlayback = null;
  clearVideoElement();
  frameKind = "agent"; lastRealtimeFrameKind = "agent";
  document.querySelectorAll(".frame-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.kind === "agent"));
  $("#transcript").innerHTML = '<div class="empty">Loading…</div>';
  $("#timeline").innerHTML = '<div class="empty">…</div>';
  $("#frame").removeAttribute("src"); $("#frameCap").textContent = "";
  refreshMeta({ primeAutoActionStep: true });
  refreshTranscript();
  connectSSE();
}

document.querySelectorAll(".frame-tabs button").forEach(btn => {
  btn.addEventListener("click", () => setFrameKind(btn.dataset.kind));
});
$("#showtools").addEventListener("change", (e) => {
  $("#transcript").classList.toggle("alltools", e.target.checked);
});

// --- draggable splitters ---
function setupSplitter(handle, opts) {
  // opts: { axis:'x'|'y', container, prop, min, max, store }
  const saved = localStorage.getItem(opts.store);
  if (saved) opts.container.style.setProperty(opts.prop, saved);
  handle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    handle.classList.add("dragging");
    document.body.classList.add("resizing");
    document.body.style.cursor = opts.axis === "x" ? "col-resize" : "row-resize";
    const rect = opts.container.getBoundingClientRect();
    const move = (ev) => {
      let v = opts.axis === "x" ? ev.clientX - rect.left : ev.clientY - rect.top;
      const limit = opts.axis === "x" ? rect.width : rect.height;
      v = Math.max(opts.min, Math.min(v, limit - opts.max));
      const px = v + "px";
      opts.container.style.setProperty(opts.prop, px);
      localStorage.setItem(opts.store, px);
    };
    const up = () => {
      handle.classList.remove("dragging");
      document.body.classList.remove("resizing");
      document.body.style.cursor = "";
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });
  // double-click to reset to default
  handle.addEventListener("dblclick", () => {
    opts.container.style.removeProperty(opts.prop);
    localStorage.removeItem(opts.store);
  });
}
setupSplitter($("#gutterV"), {
  axis: "x", container: $("main"), prop: "--leftw",
  min: 280, max: 320, store: "wm.leftw",
});
setupSplitter($("#gutterH"), {
  axis: "y", container: $(".col.right"), prop: "--frameh",
  min: 120, max: 160, store: "wm.frameh",
});

// --- launcher (start screen) ---
function showLauncher(defaults) {
  const d = defaults || {};
  const set = (id, val) => { $(id).value = val == null ? "" : val; };
  set("#f-suite", d.suite);
  set("#f-task", d.task);
  set("#f-seed", d.seed);
  set("#f-cerebrum", d.cerebrum || "anthropic");
  set("#f-max_turns", d.max_turns);
  set("#f-max_tokens", d.max_tokens);
  set("#f-max_episode_steps", d.max_episode_steps);
  set("#f-model", d.model);
  set("#f-cuda_device", d.cuda_device);
  $("#launcher").classList.remove("hidden");
}

function collectLaunchConfig() {
  const numOrNull = (id) => {
    const v = $(id).value.trim();
    return v === "" ? null : Number(v);
  };
  return {
    suite: $("#f-suite").value.trim(),
    task: numOrNull("#f-task"),
    seed: numOrNull("#f-seed"),
    cerebrum: $("#f-cerebrum").value,
    max_turns: numOrNull("#f-max_turns"),
    max_tokens: numOrNull("#f-max_tokens"),
    max_episode_steps: numOrNull("#f-max_episode_steps"),
    model: $("#f-model").value.trim(),
    cuda_device: $("#f-cuda_device").value.trim(),
  };
}

async function pollForRun() {
  try {
    const r = await fetch("/api/runs").then(x => x.json());
    if (r.runs && r.runs.length) {
      $("#launcher").classList.add("hidden");
      loadRun();
      return;
    }
  } catch (e) { /* transient — retry */ }
  setTimeout(pollForRun, 600);
}

async function onRun() {
  const config = collectLaunchConfig();
  const requiredNums = [
    ["Task", config.task],
    ["Seed", config.seed],
    ["Max turns", config.max_turns],
    ["Max tokens", config.max_tokens],
    ["Max episode steps", config.max_episode_steps],
  ];
  const badNum = requiredNums.find(([_, v]) => v == null || !Number.isFinite(v));
  if (!config.suite || badNum) {
    $("#launchStatus").textContent = !config.suite
      ? "Suite is required."
      : `${badNum[0]} is required.`;
    return;
  }
  $("#runBtn").disabled = true;
  $("#launchStatus").textContent =
    "starting… booting env & VLA servers, this can take a minute.";
  try {
    const resp = await fetch("/api/launch/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config),
    });
    if (!resp.ok) throw new Error(await resp.text());
  } catch (e) {
    $("#runBtn").disabled = false;
    $("#launchStatus").textContent = "failed to start — check the terminal.";
    return;
  }
  pollForRun();
}
$("#runBtn").addEventListener("click", onRun);

async function boot() {
  let st = { enabled: false };
  try { st = await fetch("/api/launch/state").then(x => x.json()); } catch (e) {}
  if (st.enabled && st.pending) {
    showLauncher(st.defaults);
  } else {
    // launcher already submitted (page reloaded) or not armed — go to monitor
    loadRun();
  }
}

boot();
</script>
